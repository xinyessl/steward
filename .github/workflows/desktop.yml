name: 打包桌面客户端

# 两种触发：① Actions 手动跑(选平台) ② 推 v* tag → 自动打 mac+win 并发 Release
on:
  workflow_dispatch:
    inputs:
      platform:
        description: "打哪个平台的包"
        type: choice
        default: both
        options: [both, mac, win]
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  mac:
    if: ${{ github.event_name == 'push' || inputs.platform == 'mac' || inputs.platform == 'both' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: 用 tag 设版本号
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: desktop
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: 安装依赖（含按 electron 版本重编 node-pty）
        working-directory: desktop
        run: npm install
      - name: 打 dmg
        working-directory: desktop
        run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: steward-macos-dmg
          path: desktop/dist/*.dmg
          if-no-files-found: error

  win:
    if: ${{ github.event_name == 'push' || inputs.platform == 'win' || inputs.platform == 'both' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: 用 tag 设版本号
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: desktop
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: 安装依赖（含按 electron 版本重编 node-pty）
        working-directory: desktop
        run: npm install
      - name: 打 exe（nsis 安装包）
        working-directory: desktop
        run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: steward-windows-exe
          path: desktop/dist/*.exe
          if-no-files-found: error

  release:
    needs: [mac, win]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: 打代码热更包(tools+dashboard+templates) + version.json(含 SHA256)
        run: |
          mkdir -p codepkg
          cp -r tools dashboard templates lessons.md CLAUDE.md codepkg/
          tar -czf steward-code.tar.gz -C codepkg .
          node -e "const c=require('crypto'),fs=require('fs');const b=fs.readFileSync('steward-code.tar.gz');fs.writeFileSync('version.json',JSON.stringify({version:process.env.GITHUB_REF_NAME,sha256:c.createHash('sha256').update(b).digest('hex'),requiresShell:'v0.2.17'}))"
      - name: 发布 Release（附 dmg / exe + 代码热更包）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/*/*.dmg artifacts/*/*.exe steward-code.tar.gz version.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "Steward $GITHUB_REF_NAME" \
            --generate-notes
